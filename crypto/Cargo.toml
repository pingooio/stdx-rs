[package]
name = "crypto"
version = "0.1.0"
edition = "2024"
authors = ["Sylvain Kerkour"]

[lib]
path = "./src/crypto.rs"

[features]
default = ["std", "zeroize"]

alloc = []
std = ["alloc"]
zeroize = ["dep:zeroize"]

[dependencies]
zeroize = { workspace = true, optional = true }
thiserror = { path = "../thiserror" }
big_number = { path = "../big_number" }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
constant_time_eq = { path = "../constant_time_eq" }
getrandom = "0.3"

[dev-dependencies]
criterion = { workspace = true }
hex = { path = "../hex" }

[[bench]]
name = "hash"
harness = false

[[bench]]
name = "mac"
harness = false
