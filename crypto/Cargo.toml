[package]
name = "crypto"
version = "0.1.0"
edition = "2024"
authors = ["Sylvain Kerkour"]

[lib]
path = "./src/crypto.rs"

[features]
default = ["std", "zeroize"]

alloc = []
std = ["alloc"]
zeroize = ["dep:zeroize"]

[dependencies]
zeroize = { workspace = true, optional = true }
thiserror = { path = "../thiserror" }

[dev-dependencies]
criterion = { workspace = true }
hex = { path = "../hex" }

[[bench]]
name = "hash"
harness = false

[[bench]]
name = "mac"
harness = false
